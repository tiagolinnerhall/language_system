<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lang5K Checkout</title>
<meta name="description" content="Start secure Lang5K checkout.">
<link rel="canonical" href="https://www.lang5k.com/checkout.html">
<meta name="theme-color" content="#2563eb">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.webmanifest">
<style>
body{margin:0;font-family:Inter,Arial,sans-serif;background:#f3f5f8;color:#111827;line-height:1.65}.wrap{max-width:760px;margin:0 auto;padding:40px 24px}.panel{background:#fff;border:1px solid #dbe3ee;border-radius:16px;padding:28px;box-shadow:0 12px 32px rgba(15,23,42,.12)}a{color:#2563eb}.top{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:28px}.top a{font-weight:800;text-decoration:none}.status{padding:14px 16px;border-radius:12px;background:#eff6ff;border:1px solid #bfdbfe;color:#1e3a8a}.error{background:#fef2f2;border-color:#fecaca;color:#991b1b}.btn{display:inline-flex;margin-top:16px;background:#2563eb;color:#fff;border-radius:10px;padding:12px 16px;text-decoration:none;font-weight:800;border:0;cursor:pointer}.muted{color:#4b5563}
</style>
</head>
<body><div class="wrap"><div class="top"><a href="/">5K Lang5K</a><a href="pricing.html">Pricing</a></div><main class="panel">
<h1>Secure Checkout</h1>
<p class="muted">Lang5K checkout is handled by Stripe. After successful payment, the app verifies the checkout session and unlocks the full Russian course on this browser.</p>
<div id="status" class="status">Ready to start secure Stripe checkout.</div>
<button class="btn" id="checkoutBtn" onclick="startCheckout()">Continue to Stripe</button>
</main></div>
<script>
async function startCheckout(){
 const status=document.getElementById('status');
 const button=document.getElementById('checkoutBtn');
 button.disabled=true;
 button.textContent='Opening Stripe...';
 status.className='status';
 status.textContent='Opening secure Stripe checkout...';
 try{
  const response=await fetch('/api/create-checkout-session',{method:'POST'});
  const data=await response.json().catch(()=>({error:'Unable to read checkout response.'}));
  if(!response.ok||!data.url)throw new Error(data.error||'Unable to start checkout.');
  window.location.href=data.url;
 }catch(error){
  status.className='status error';
  status.innerHTML='<strong>Checkout could not start.</strong><br>'+error.message+'<br><br>Please email <a href="mailto:billing@lang5k.com">billing@lang5k.com</a> and we will help you get access.';
  button.disabled=false;
  button.textContent='Try again';
 }
}
if('serviceWorker' in navigator){
 window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body></html>
