<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lang5K Admin</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;background:#f3f5f8;color:#111827}.wrap{max-width:1100px;margin:0 auto;padding:28px 24px 56px}.top{display:flex;justify-content:space-between;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:28px}.logo{font-weight:800;color:#2563eb;text-decoration:none;font-size:1.4rem}.controls{display:flex;gap:10px;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;padding:11px 16px;border-radius:10px;border:1px solid #cbd5e1;background:#fff;color:#111827;text-decoration:none;font-weight:700;cursor:pointer}.btn.primary{background:#2563eb;border-color:#2563eb;color:#fff}.hero{background:#fff;border:1px solid #dbe3ee;border-radius:18px;box-shadow:0 12px 32px rgba(15,23,42,.08);padding:24px;margin-bottom:18px}.hero h1{margin:0 0 8px;font-size:2rem}.hero p{margin:0;color:#4b5563;max-width:820px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;margin:18px 0}.card{background:#fff;border:1px solid #dbe3ee;border-radius:16px;padding:20px}.card h2{font-size:1.05rem;margin:0 0 10px}.status-pill{display:inline-block;padding:6px 10px;border-radius:999px;background:rgba(37,99,235,.1);color:#2563eb;font-weight:800;font-size:.82rem;margin-bottom:10px}.muted{color:#6b7280;font-size:.88rem}.list{margin:0;padding-left:18px;color:#374151}.list li{margin:8px 0}.links{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}.error{color:#dc2626;font-weight:700}.mini{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:18px}.mini .card{padding:18px}
</style>
</head>
<body>
 <div class="wrap">
  <div class="top">
   <a class="logo" href="/admin.html">Lang5K Admin</a>
   <div class="controls">
    <a class="btn" href="/">Open site</a>
    <button class="btn" id="logoutBtn" type="button">Log out</button>
   </div>
  </div>
  <div id="app">
   <div class="hero">
    <h1>Loading the admin report...</h1>
    <p>This page summarizes what was improved, what still blocks premium, and what the next moves are.</p>
   </div>
  </div>
 </div>
 <script>
 async function logout(){
  const button=document.getElementById('logoutBtn');
  button.disabled=true;
  await fetch('/api/admin-preview-logout',{method:'POST'}).catch(()=>null);
  location.href='/login.html';
 }

 function listHtml(items){
  return `<ul class="list">${items.map(item=>`<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
 }

 function metricsHtml(metrics){
  if(!metrics||!metrics.configured){
   return `<div class="card"><h2>Live metrics</h2><p class="error">${escapeHtml(metrics?.error||'Live metrics are not connected yet.')}</p></div>`;
  }
  const cards=[
   ['Active customers',metrics.activeCustomers],
   ['Refunded',metrics.refundedCustomers],
   ['Disputed',metrics.disputedCustomers],
   ['Cloud progress users',metrics.progressAccounts],
   ['Analytics 24h',metrics.analytics24h],
   ['Billing events 24h',metrics.billing24h],
   ['Stripe webhook events',metrics.stripeWebhookEvents]
  ];
  return `<div class="card"><h2>Live metrics</h2><div class="grid" style="margin:10px 0 0">${cards.map(([label,value])=>`<div class="card" style="box-shadow:none;padding:14px"><div style="font-size:1.6rem;font-weight:800;color:#2563eb">${escapeHtml(value??0)}</div><div class="muted">${escapeHtml(label)}</div></div>`).join('')}</div></div>`;
 }

 function escapeHtml(value){
  return String(value??'').replace(/[&<>"']/g,char=>({
   '&':'&amp;',
   '<':'&lt;',
   '>':'&gt;',
   '"':'&quot;',
   "'":'&#39;'
  })[char]);
 }

 async function loadReport(){
  const host=document.getElementById('app');
  try{
   const response=await fetch('/api/admin-report',{cache:'no-store'});
   const data=await response.json().catch(()=>({}));
   if(!response.ok)throw new Error(data.error||'Could not load the admin report.');
   host.innerHTML=`
    <div class="hero">
     <div class="status-pill">${escapeHtml(data.status)}</div>
     <h1>What Lang5K did, what is next, and what you can decide</h1>
     <p>${escapeHtml(data.summary)}</p>
     <p class="muted" style="margin-top:12px">Last updated: ${escapeHtml(new Date(data.updatedAt).toLocaleString())}</p>
     <div class="links">
      ${(data.links||[]).map(link=>`<a class="btn primary" href="${escapeHtml(link.href)}">${escapeHtml(link.label)}</a>`).join('')}
     </div>
    </div>
    <div class="mini">
     <div class="card">
      <h2>What the loop is doing</h2>
      <p class="muted">The premium checklist tracks checkout, access, recovery, progress sync, analytics, course QA, and learner-flow quality. Anything still listed below either needs code work or your approval/test.</p>
     </div>
     <div class="card">
      <h2>What you can do</h2>
      ${listHtml(data.suggestedNow||[])}
     </div>
    </div>
    ${metricsHtml(data.metrics)}
    <div class="grid">
     <div class="card">
      <h2>Done now</h2>
      ${listHtml(data.doneNow||[])}
     </div>
     <div class="card">
      <h2>Can do next</h2>
      ${listHtml(data.canDoNext||[])}
     </div>
     <div class="card">
      <h2>Needs you</h2>
      ${listHtml(data.needsYou||[])}
     </div>
     <div class="card">
      <h2>Biggest blockers</h2>
      ${listHtml(data.biggestBlockers||[])}
     </div>
    </div>`;
  }catch(error){
   host.innerHTML=`<div class="hero"><h1>Admin report unavailable</h1><p class="error">${error.message||'Could not load the report.'}</p></div>`;
  }
 }

 document.getElementById('logoutBtn').addEventListener('click',logout);
 loadReport();
 </script>
</body>
</html>
